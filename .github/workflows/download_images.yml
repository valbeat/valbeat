name: Download images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: download-images
  cancel-in-progress: false

jobs:
  download-github-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download GitHub Stats
        run: |
          echo "Downloading GitHub Stats..."
          for i in 1 2 3; do
            http_code=$(curl -sS -o ./github-readme-stats-api.svg -w '%{http_code}' \
              'https://github-readme-stats-git-master-valbeat.vercel.app/api?username=valbeat&show_icons=true&hide_title=true&hide_border=true&line_height=24&show=reviews&theme=gotham' || echo 000)
            # エラーカードは HTTP 200 で返るため、ステータスコードだけでなく文言でも判定する
            if [ "$http_code" = "200" ] && ! grep -q 'Something went wrong' ./github-readme-stats-api.svg; then
              echo "Download succeeded (attempt $i)."
              break
            fi
            echo "Attempt $i failed (HTTP $http_code); retrying..."
            sleep 15
          done
      - name: Validate GitHub Stats SVG
        run: |
          if python3 -c "import xml.dom.minidom; xml.dom.minidom.parse('./github-readme-stats-api.svg')" \
            && grep -q '<svg' ./github-readme-stats-api.svg \
            && ! grep -q 'Something went wrong' ./github-readme-stats-api.svg; then
            echo "Downloaded SVG looks valid."
          else
            echo "::warning::Downloaded github-readme-stats-api.svg is invalid or an error card; keeping previous version."
            cp ./images/github-stats/github-readme-stats-api.svg ./github-readme-stats-api.svg
          fi
      - name: Upload GitHub Stats
        uses: actions/upload-artifact@v7
        with:
          name: github-stats
          path: ./github-readme-stats-api.svg

  download-top-langs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Top Langs
        run: |
          echo "Downloading Top Langs..."
          for i in 1 2 3; do
            http_code=$(curl -sS -o ./top-langs.svg -w '%{http_code}' \
              'https://github-readme-stats-git-master-valbeat.vercel.app/api/top-langs/?username=valbeat&hide_title=true&theme=gotham&layout=compact&hide_border=true&langs_count=10&hide=html,css,shell&size_weight=0.7&count_weight=0.3' || echo 000)
            # エラーカードは HTTP 200 で返るため、ステータスコードだけでなく文言でも判定する
            if [ "$http_code" = "200" ] && ! grep -q 'Something went wrong' ./top-langs.svg; then
              echo "Download succeeded (attempt $i)."
              break
            fi
            echo "Attempt $i failed (HTTP $http_code); retrying..."
            sleep 15
          done
      - name: Validate Top Langs SVG
        run: |
          if python3 -c "import xml.dom.minidom; xml.dom.minidom.parse('./top-langs.svg')" \
            && grep -q '<svg' ./top-langs.svg \
            && ! grep -q 'Something went wrong' ./top-langs.svg; then
            echo "Downloaded SVG looks valid."
          else
            echo "::warning::Downloaded top-langs.svg is invalid or an error card; keeping previous version."
            cp ./images/top-langs/top-langs.svg ./top-langs.svg
          fi
      - name: Upload Top Langs
        uses: actions/upload-artifact@v7
        with:
          name: top-langs
          path: ./top-langs.svg

  download-holopin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Holopin Badges
        run: |
          echo "Downloading Holopin Badges..."
          curl -sSf --retry 3 --retry-all-errors -o ./holopin-badges.png \
            'https://holopin.me/valbeat' || echo "::warning::Holopin download failed."
      - name: Validate Holopin Badges PNG
        run: |
          if file -b ./holopin-badges.png | grep -qi 'PNG image data'; then
            echo "Downloaded PNG looks valid."
          else
            echo "::warning::Downloaded holopin-badges.png does not look like a valid PNG; keeping previous version."
            cp ./images/holopin/holopin-badges.png ./holopin-badges.png
          fi
      - name: Upload Holopin Badges
        uses: actions/upload-artifact@v7
        with:
          name: holopin
          path: ./holopin-badges.png

  commit-and-push:
    needs: [download-github-stats, download-top-langs, download-holopin]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./images
      - name: Config Git User (Local)
        run: |
          git config --local user.email "kj1ktk@gmail.com"
          git config --local user.name "Takuma Kajikawa"
      - name: Commit and Push Changes
        run: |
          git add ./images
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update cached images"
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying after rebase ($i)..."
            git pull --rebase
          done
