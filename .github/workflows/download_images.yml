name: Download images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: download-images
  cancel-in-progress: false

jobs:
  download-github-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download GitHub Stats
        run: |
          echo "Downloading GitHub Stats..."
          download() {
            for i in 1 2 3; do
              http_code=$(curl -sS -o "$2" -w '%{http_code}' "$1" || echo 000)
              # エラーカードは HTTP 200 で返るため、ステータスコードだけでなく文言でも判定する
              if [ "$http_code" = "200" ] && ! grep -q 'Something went wrong' "$2"; then
                echo "$2: download succeeded (attempt $i)."
                return 0
              fi
              echo "$2: attempt $i failed (HTTP $http_code); retrying..."
              sleep 15
            done
            return 1
          }
          BASE='https://github-readme-stats-git-master-valbeat.vercel.app/api?username=valbeat&show_icons=true&hide_title=true&hide_border=true&line_height=24&show=reviews&disable_animations=true'
          download "${BASE}&theme=gotham" ./github-readme-stats-api-dark.svg || true
          download "${BASE}&theme=default" ./github-readme-stats-api-light.svg || true
      - name: Validate GitHub Stats SVG
        run: |
          validate() {
            if python3 -c "import xml.dom.minidom, sys; xml.dom.minidom.parse(sys.argv[1])" "$1" \
              && grep -q '<svg' "$1" \
              && ! grep -q 'Something went wrong' "$1"; then
              echo "$1 looks valid."
            else
              echo "::warning::$1 is invalid or an error card; keeping previous version."
              cp "$2" "$1"
            fi
          }
          validate ./github-readme-stats-api-dark.svg ./images/github-stats/github-readme-stats-api-dark.svg
          validate ./github-readme-stats-api-light.svg ./images/github-stats/github-readme-stats-api-light.svg
      - name: Strip animations
        run: |
          python3 tools/strip_svg_animations.py ./github-readme-stats-api-dark.svg ./github-readme-stats-api-light.svg
      - name: Upload GitHub Stats
        uses: actions/upload-artifact@v7
        with:
          name: github-stats
          path: |
            ./github-readme-stats-api-dark.svg
            ./github-readme-stats-api-light.svg

  download-top-langs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Top Langs
        run: |
          echo "Downloading Top Langs..."
          download() {
            for i in 1 2 3; do
              http_code=$(curl -sS -o "$2" -w '%{http_code}' "$1" || echo 000)
              # エラーカードは HTTP 200 で返るため、ステータスコードだけでなく文言でも判定する
              if [ "$http_code" = "200" ] && ! grep -q 'Something went wrong' "$2"; then
                echo "$2: download succeeded (attempt $i)."
                return 0
              fi
              echo "$2: attempt $i failed (HTTP $http_code); retrying..."
              sleep 15
            done
            return 1
          }
          BASE='https://github-readme-stats-git-master-valbeat.vercel.app/api/top-langs/?username=valbeat&hide_title=true&layout=compact&hide_border=true&langs_count=10&hide=html,css,shell&size_weight=0.7&count_weight=0.3&disable_animations=true'
          download "${BASE}&theme=gotham" ./top-langs-dark.svg || true
          download "${BASE}&theme=default" ./top-langs-light.svg || true
      - name: Validate Top Langs SVG
        run: |
          validate() {
            if python3 -c "import xml.dom.minidom, sys; xml.dom.minidom.parse(sys.argv[1])" "$1" \
              && grep -q '<svg' "$1" \
              && ! grep -q 'Something went wrong' "$1"; then
              echo "$1 looks valid."
            else
              echo "::warning::$1 is invalid or an error card; keeping previous version."
              cp "$2" "$1"
            fi
          }
          validate ./top-langs-dark.svg ./images/top-langs/top-langs-dark.svg
          validate ./top-langs-light.svg ./images/top-langs/top-langs-light.svg
      - name: Strip animations
        run: |
          python3 tools/strip_svg_animations.py ./top-langs-dark.svg ./top-langs-light.svg
      - name: Upload Top Langs
        uses: actions/upload-artifact@v7
        with:
          name: top-langs
          path: |
            ./top-langs-dark.svg
            ./top-langs-light.svg

  download-holopin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Holopin Badges
        run: |
          echo "Downloading Holopin Badges..."
          curl -sSf --retry 3 --retry-all-errors -o ./holopin-badges.png \
            'https://holopin.me/valbeat' || echo "::warning::Holopin download failed."
      - name: Validate Holopin Badges PNG
        run: |
          if file -b ./holopin-badges.png | grep -qi 'PNG image data'; then
            echo "Downloaded PNG looks valid."
          else
            echo "::warning::Downloaded holopin-badges.png does not look like a valid PNG; keeping previous version."
            cp ./images/holopin/holopin-badges.png ./holopin-badges.png
          fi
      - name: Upload Holopin Badges
        uses: actions/upload-artifact@v7
        with:
          name: holopin
          path: ./holopin-badges.png

  commit-and-push:
    needs: [download-github-stats, download-top-langs, download-holopin]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./images
      - name: Config Git User (Local)
        run: |
          git config --local user.email "kj1ktk@gmail.com"
          git config --local user.name "Takuma Kajikawa"
      - name: Commit and Push Changes
        run: |
          git add ./images
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update cached images"
          for i in 1 2 3; do
            git push && break
            echo "Push failed, retrying after rebase ($i)..."
            git pull --rebase
          done
